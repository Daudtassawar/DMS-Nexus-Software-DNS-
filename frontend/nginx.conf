server {
    listen       5173;
    listen  [::]:5173;
    server_name  localhost;

    charset utf-8;
    root /usr/share/nginx/html;
    index index.html;

    # Always serve index.html for React Router to handle pushState routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Use Docker's internal DNS resolver to allow starting Nginx before the backend is fully resolvable
    resolver 127.0.0.11 valid=30s;

    # Proxy API calls directly to the .NET backend container
    location /api/ {
        set $backend_upstream http://backend:5000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
